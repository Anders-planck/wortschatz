<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Geometric book shape - two overlapping rectangles -->
  <!-- Left page - ochre -->
  <rect x="25" y="30" width="32" height="60" rx="3" fill="#C4A96A" transform="rotate(-6, 41, 60)"/>
  <!-- Right page - dusty rose -->
  <rect x="63" y="30" width="32" height="60" rx="3" fill="#D4AAA0" transform="rotate(6, 79, 60)"/>
  <!-- Spine line -->
  <line x1="60" y1="28" x2="60" y2="92" stroke="#2C2C2C" stroke-width="2" stroke-linecap="round"/>
</svg>
